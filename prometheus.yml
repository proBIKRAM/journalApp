metrics:
  configs:
    - name: default
      scrape_configs:
        - job_name: 'backend'
          metrics_path: '/actuator/prometheus'
          basic_auth:
            username: ${PROM_USER}
            password: ${PROM_PASS}
          static_configs:
            - targets: ['https://journalapp-vg41.onrender.com']
